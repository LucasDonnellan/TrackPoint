# ── Nginx reverse proxy — FarmTrack ──────────────────────────────────────────

upstream api_backend {
    server api:5000;
    keepalive 32;
}

upstream frontend_app {
    server frontend:80;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com;   # ← CHANGE THIS

    ssl_certificate     /etc/ssl/farmtrack/fullchain.pem;
    ssl_certificate_key /etc/ssl/farmtrack/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 2m;

    # API calls
    location /api/ {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Health check (for AWS ALB target group)
    location /health {
        proxy_pass http://api_backend;
    }

    # Frontend SPA
    location / {
        proxy_pass         http://frontend_app;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
